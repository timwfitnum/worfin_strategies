# Alert Rules for Quantitative Trading System

groups:
  # ==========================================================================
  # Trading System Alerts
  # ==========================================================================
  - name: trading_alerts
    rules:
      # Drawdown alerts
      - alert: HighDrawdown
        expr: quant_portfolio_drawdown > 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Portfolio drawdown exceeds 10%"
          description: "Current drawdown: {{ $value | humanizePercentage }}"

      - alert: CriticalDrawdown
        expr: quant_portfolio_drawdown > 0.15
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Portfolio drawdown exceeds 15% - KILL SWITCH THRESHOLD"
          description: "Current drawdown: {{ $value | humanizePercentage }}"

      # Strategy performance degradation
      - alert: StrategySharpeDecline
        expr: quant_strategy_sharpe_30d < 0.5 * quant_strategy_sharpe_backtest
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Strategy Sharpe ratio declined >50% from backtest"
          description: "Strategy {{ $labels.strategy }} Sharpe: {{ $value }}"

      # Position limit breach
      - alert: PositionLimitBreach
        expr: quant_position_size_pct > 0.02
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Position size exceeds 2% limit"
          description: "Position {{ $labels.symbol }}: {{ $value | humanizePercentage }}"

      # VaR breach
      - alert: VaRBreach
        expr: quant_daily_var_95 > 0.025
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Daily VaR exceeds 2.5% limit"
          description: "Current VaR: {{ $value | humanizePercentage }}"

  # ==========================================================================
  # Data Quality Alerts
  # ==========================================================================
  - name: data_quality_alerts
    rules:
      - alert: DataFeedStale
        expr: time() - quant_last_tick_timestamp > 60
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Data feed stale for {{ $labels.symbol }}"
          description: "No data received for {{ $value | humanizeDuration }}"

      - alert: DataFeedDown
        expr: quant_data_feed_connected == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Data feed {{ $labels.provider }} is disconnected"
          description: "Provider {{ $labels.provider }} connection lost"

      - alert: HighDataLatency
        expr: quant_data_latency_ms > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High data latency detected"
          description: "Latency: {{ $value }}ms for {{ $labels.provider }}"

      - alert: DataQualityLow
        expr: quant_data_quality_score < 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Data quality score below threshold"
          description: "Quality score: {{ $value }} for {{ $labels.symbol }}"

  # ==========================================================================
  # Execution Alerts
  # ==========================================================================
  - name: execution_alerts
    rules:
      - alert: HighSlippage
        expr: avg_over_time(quant_execution_slippage_bps[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Average slippage exceeds 10 bps"
          description: "Average slippage: {{ $value }} bps"

      - alert: OrderRejectionRate
        expr: rate(quant_orders_rejected_total[5m]) / rate(quant_orders_submitted_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Order rejection rate exceeds 5%"
          description: "Rejection rate: {{ $value | humanizePercentage }}"

      - alert: BrokerConnectionLost
        expr: quant_broker_connected == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Broker connection lost"
          description: "Connection to {{ $labels.broker }} lost"

  # ==========================================================================
  # Infrastructure Alerts
  # ==========================================================================
  - name: infrastructure_alerts
    rules:
      - alert: HighCPUUsage
        expr: process_cpu_seconds_total > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage: {{ $value | humanizePercentage }}"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage: {{ $value | humanizePercentage }}"

      - alert: DiskSpaceLow
        expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low"
          description: "Available: {{ $value | humanizePercentage }}"

      - alert: DatabaseConnectionPoolExhausted
        expr: quant_db_pool_available == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool exhausted"
          description: "No available connections for {{ $labels.database }}"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory: {{ $value | humanizePercentage }}"