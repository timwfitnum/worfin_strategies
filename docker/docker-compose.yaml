version: '3.9'

x-common-variables: &common-variables
  PYTHONUNBUFFERED: "1"
  QUANT_ENVIRONMENT: "development"
  QUANT_LOG_LEVEL: "DEBUG"
  QUANT_TIMESCALEDB__HOST: "timescaledb"
  QUANT_TIMESCALEDB__PORT: "5432"
  QUANT_TIMESCALEDB__USER: "quant"
  QUANT_TIMESCALEDB__PASSWORD: "quant123"
  QUANT_TIMESCALEDB__DATABASE: "quant_trading"
  QUANT_CLICKHOUSE__HOST: "clickhouse"
  QUANT_CLICKHOUSE__PORT: "9000"
  QUANT_REDIS__HOST: "redis"
  QUANT_REDIS__PORT: "6379"

services:
  # ==========================================================================
  # Main Application
  # ==========================================================================
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        - ENVIRONMENT=development
    container_name: quant-app
    hostname: quant-app
    environment:
      <<: *common-variables
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./configs:/app/configs:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./notebooks:/app/notebooks
    ports:
      - "8000:8000"   # FastAPI
      - "5555:5555"   # Flower (Celery)
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - quant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      sh -c "
        python scripts/setup_db.py &&
        uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # ==========================================================================
  # Celery Worker
  # ==========================================================================
  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: quant-celery-worker
    environment:
      <<: *common-variables
    volumes:
      - ./src:/app/src:ro
      - ./configs:/app/configs:ro
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
      - timescaledb
    networks:
      - quant-network
    restart: unless-stopped
    command: celery -A src.core.celery_app worker --loglevel=info --concurrency=4

  # ==========================================================================
  # Celery Beat (Scheduler)
  # ==========================================================================
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: quant-celery-beat
    environment:
      <<: *common-variables
    volumes:
      - ./src:/app/src:ro
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
    depends_on:
      - redis
      - timescaledb
    networks:
      - quant-network
    restart: unless-stopped
    command: celery -A src.core.celery_app beat --loglevel=info

  # ==========================================================================
  # TimescaleDB (PostgreSQL with Time-Series)
  # ==========================================================================
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: quant-timescaledb
    hostname: timescaledb
    environment:
      POSTGRES_DB: quant_trading
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant123
      TS_TUNE_MAX_CONNS: "100"
      TS_TUNE_MAX_BG_WORKERS: "8"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./scripts/init_timescaledb.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - quant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant_trading"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # ==========================================================================
  # ClickHouse (Analytics Database)
  # ==========================================================================
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: quant-clickhouse
    hostname: clickhouse
    environment:
      CLICKHOUSE_DB: quant_analytics
      CLICKHOUSE_USER: quant
      CLICKHOUSE_PASSWORD: quant123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./scripts/init_clickhouse.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./configs/clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
      - ./configs/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    networks:
      - quant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  # ==========================================================================
  # Redis (Cache & Message Queue)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: quant-redis
    hostname: redis
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 2gb 
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 0
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - quant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  # ==========================================================================
  # Grafana (Monitoring Dashboards)
  # ==========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: quant-grafana
    hostname: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - quant-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # ==========================================================================
  # Prometheus (Metrics Collection)
  # ==========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: quant-prometheus
    hostname: prometheus
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    networks:
      - quant-network
    restart: unless-stopped

  # ==========================================================================
  # Alertmanager
  # ==========================================================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: quant-alertmanager
    hostname: alertmanager
    volumes:
      - ./configs/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    networks:
      - quant-network
    restart: unless-stopped

  # ==========================================================================
  # Jupyter Lab (Research)
  # ==========================================================================
  jupyter:
    build:
      context: .
      dockerfile: docker/jupyter/Dockerfile
    container_name: quant-jupyter
    hostname: jupyter
    environment:
      <<: *common-variables
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "quant123"
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./src:/home/jovyan/src:ro
      - ./data:/home/jovyan/data
    ports:
      - "8888:8888"
    networks:
      - quant-network
    restart: unless-stopped
    depends_on:
      - timescaledb
      - redis
      - clickhouse

  # ==========================================================================
  # Redis Commander (Redis UI)
  # ==========================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: quant-redis-commander
    hostname: redis-commander
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8081:8081"
    networks:
      - quant-network
    restart: unless-stopped
    depends_on:
      - redis

  # ==========================================================================
  # pgAdmin (PostgreSQL UI)
  # ==========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: quant-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@quant.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - quant-network
    restart: unless-stopped
    depends_on:
      - timescaledb

# ==========================================================================
# Networks
# ==========================================================================
networks:
  quant-network:
    driver: bridge
    name: quant-network

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  timescaledb_data:
    driver: local
  clickhouse_data:
    driver: local
  redis_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  pgadmin_data:
    driver: local