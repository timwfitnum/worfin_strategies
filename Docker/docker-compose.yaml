version: '3.9'

x-common-variables: &common-variables
  PYTHONUNBUFFERED: "1"
  ENVIRONMENT: "development"
  LOG_LEVEL: "DEBUG"

services:
  # Main application container
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      args:
        - ENVIRONMENT=development
    container_name: quant-app
    hostname: quant-app
    environment:
      <<: *common-variables
      DATABASE_URL: "postgresql://quant:quant123@timescaledb:5432/quant_trading"
      REDIS_URL: "redis://redis:6379/0"
      CLICKHOUSE_HOST: "clickhouse"
      CLICKHOUSE_PORT: "9000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./configs:/app/configs
      - ./data:/app/data
      - ./logs:/app/logs
      - ./notebooks:/app/notebooks
    ports:
      - "8000:8000" # FastAPI
      - "8888:8888" # Jupyter
      - "5555:5555" # Flower (Celery monitoring)
    depends_on:
      - timescaledb
      - redis
      - clickhouse
    networks:
      - quant-network
    restart: unless-stopped
    command: >
      sh -c "
        python scripts/setup_db.py &&
        uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Celery Worker
  celery-worker:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: quant-celery-worker
    environment:
      <<: *common-variables
      DATABASE_URL: "postgresql://quant:quant123@timescaledb:5432/quant_trading"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
      - timescaledb
    networks:
      - quant-network
    restart: unless-stopped
    command: celery -A src.core.celery_app worker --loglevel=info --concurrency=4

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: quant-celery-beat
    environment:
      <<: *common-variables
      DATABASE_URL: "postgresql://quant:quant123@timescaledb:5432/quant_trading"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
      - ./logs:/app/logs
    depends_on:
      - redis
      - timescaledb
    networks:
      - quant-network
    restart: unless-stopped
    command: celery -A src.core.celery_app beat --loglevel=info

  # TimescaleDB (PostgreSQL with time-series optimization)
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: quant-timescaledb
    hostname: timescaledb
    environment:
      POSTGRES_DB: quant_trading
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant123
      TS_TUNE_MAX_CONNS: 100
      TS_TUNE_MAX_BG_WORKERS: 8
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - quant-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U quant -d quant_trading" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ClickHouse for high-performance analytics
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: quant-clickhouse
    hostname: clickhouse
    environment:
      CLICKHOUSE_DB: quant_analytics
      CLICKHOUSE_USER: quant
      CLICKHOUSE_PASSWORD: quant123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./configs/clickhouse:/etc/clickhouse-server/config.d:ro
    ports:
      - "8123:8123" # HTTP interface
      - "9000:9000" # Native protocol
    networks:
      - quant-network
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # Redis for caching and message broker
  redis:
    image: redis:7-alpine
    container_name: quant-redis
    hostname: redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - quant-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana for monitoring dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: quant-grafana
    hostname: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - quant-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: quant-prometheus
    hostname: prometheus
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    networks:
      - quant-network
    restart: unless-stopped

  # Jupyter Lab for research
  jupyter:
    build:
      context: .
      dockerfile: docker/jupyter/Dockerfile
    container_name: quant-jupyter
    hostname: jupyter
    environment:
      <<: *common-variables
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "quant123"
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./src:/home/jovyan/src
      - ./data:/home/jovyan/data
    ports:
      - "8889:8888"
    networks:
      - quant-network
    restart: unless-stopped
    depends_on:
      - timescaledb
      - redis
      - clickhouse

  # Nginx reverse proxy (optional, for production-like setup)
  nginx:
    image: nginx:alpine
    container_name: quant-nginx
    hostname: nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - quant-network
    restart: unless-stopped
    depends_on:
      - app

networks:
  quant-network:
    driver: bridge
    name: quant-network

volumes:
  timescaledb_data:
    driver: local
  clickhouse_data:
    driver: local
  redis_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
